<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
<form>
    <fieldset>
        <legend>Contact Details:</legend>
            <label>
                Email: <br/>
                <input type="text" name="email"/>
                <br/>
            </label>
            <label>
                Mobile: <br/>
                <input type="text" name="mobile"/>
                <br>
            </label>
            <label>
                Telephone: <br/>
                <input type="text" name="telephone"/>
            </label>
    </fieldset>
</form>
</body>
</html>
