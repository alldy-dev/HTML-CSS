<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="number" id="num1" value="5">
    <input type="number" id="num2" value="7">

    <!-- Botão genérico controlado por JavaScript -->
    <button type="button" onclick="somar()">Somar</button>

    <p id="resultado"></p>

    <script>
        function somar() {
            const n1 = parseInt(document.getElementById('num1').value);
            const n2 = parseInt(document.getElementById('num2').value);
            document.getElementById('resultado').textContent = n1 + n2;
        }
    </script>

</body>

</html>
