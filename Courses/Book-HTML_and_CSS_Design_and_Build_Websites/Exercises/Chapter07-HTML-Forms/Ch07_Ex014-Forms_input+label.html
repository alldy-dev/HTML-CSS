<html lang="pt-BR">
<head>

    <title>Forms</title>
</head>
<body>
<form action="#">
<!-- Jeito 01 de usar o label+input -->

        Age:

<!-- Jeito 02 de usar o label+input -->
 <input id="female" type="radio" name="gender" value="f">

   <label for="male">Male</label>
</form>
