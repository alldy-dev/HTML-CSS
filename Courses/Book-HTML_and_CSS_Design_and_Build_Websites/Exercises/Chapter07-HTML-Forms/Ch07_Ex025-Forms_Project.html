<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#">
        <fieldset>
            <legend>Contact details</legend>
                <!--Tipo 01 de usar label/input -->
                <label>Name: <input type="text" name="age" /></label>
                <br/>
                <label>Email: <input type="text"></label>
        </fieldset>
        <fieldset>
            <legend>Your Review:</legend>
            <p>
                <label for="hear_about">How did you hear about us?</label>
                <select name="hear_about">
                    <option value="google">Google</option>
                    <option value="yahoo">Yahoo</option>
                    <option value="linkedin">Linkedin</option>
                </select>
            </p>
            <p>Would you visit again? 
                <br/>
                <label><input type="radio" name="answer" value="yes" checked="checked" />Yes</label>
                <label><input type="radio" name="answer" value="no" />No</label>
                <label><input type="radio" name="answer" value="maybe"/>Maybe</label>
            </p>
            <p>
                Comments: <br/>
                <textarea name="comments" cols="30" rows="5">Type hear</textarea>
            </p>
            <label>
                <input type="checkbox" name="confirmacao" value="sign_in">Sign me up for email updates
            </label>
            <br/>
                <input type="submit" value="Upload">
            <p>
                <button>Upload_2</button>
            </p>
        </fieldset>
    </form>
</body>
</html>
